name: Model migration
on:
  schedule:
    - cron: '17 8 * * 1'
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: broom609/model-sunset@v1
        with:
          mode: pr
          github-token: ${{ secrets.GITHUB_TOKEN }}
          verify-command: npm test
          draft: 'true'
